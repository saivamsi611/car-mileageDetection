<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPredict AI - Car Mileage</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Background Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="app">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-content">
                <h1><i class="fa-solid fa-bolt text-gradient"></i> AutoPredict AI</h1>
                <p id="accuracy" class="badge">Loading model status...</p>
            </div>
            <button class="theme-toggle" id="themeToggleBtn" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <!-- Flex Container for Cards -->
        <div class="flex-container">
            <!-- Manual Prediction Card -->
            <div class="glass-card flex-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-sliders"></i> Manual Input</h2>
                    <p class="subtitle">Enter vehicle specs for an instant prediction.</p>
                </div>

                <!-- PRESETS -->
                <div class="presets-container" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button type="button" class="preset-btn" onclick="applyPreset('muscle')">🏎️ Vintage Muscle</button>
                    <button type="button" class="preset-btn" onclick="applyPreset('economy')">🚗 Economy Hatch</button>
                    <button type="button" class="preset-btn" onclick="applyPreset('truck')">🚚 Heavy Duty</button>
                </div>

                <form id="predictForm">
                    <div class="flex-form">
                        <div class="input-group">
                            <label><i class="fa-solid fa-dharmachakra"></i> Cylinders</label>
                            <input type="number" placeholder="4, 6, 8..." id="cylinders" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-gauge-high"></i> Displacement</label>
                            <input type="number" placeholder="e.g. 150" id="displacement" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-horse"></i> Horsepower</label>
                            <input type="number" placeholder="e.g. 100" id="horsepower" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-weight-hanging"></i> Weight</label>
                            <input type="number" placeholder="e.g. 3000 lbs" id="weight" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-gauge"></i> Acceleration</label>
                            <input type="number" step="0.1" placeholder="e.g. 15.0" id="acceleration" required>
                        </div>
                        <div class="input-group">
                            <label><i class="fa-solid fa-calendar"></i> Model Year</label>
                            <input type="number" placeholder="e.g. 80" id="model_year" required>
                        </div>
                        <div class="input-group full-width">
                            <label><i class="fa-solid fa-globe"></i> Origin</label>
                            <select id="origin" required>
                                <option value="" disabled selected>Select Origin</option>
                                <option value="1">1 - American</option>
                                <option value="2">2 - European</option>
                                <option value="3">3 - Japanese</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="primary-btn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Predict Mileage
                    </button>
                </form>

                <div id="result" class="result-box" style="display:none;"></div>
                <div class="charts-container" id="chartsContainer" style="display:none;">
                    <div class="chart-wrapper"><canvas id="chart"></canvas></div>
                    <div class="chart-wrapper"><canvas id="chart2"></canvas></div>
                </div>
            </div>

            <!-- AI Insights Card -->
        <div class="glass-card flex-card">
            <div class="card-header">
                <h2><i class="fa-solid fa-brain"></i> AI Decision Insights</h2>
                <p class="subtitle">Understand exactly what drives the ML model's predictions.</p>
            </div>
            <div style="text-align: center; margin-bottom: 15px;">
                <button onclick="loadInsights()" class="secondary-btn" style="width: auto; padding: 8px 16px; margin: 0 auto;"><i class="fa-solid fa-magnifying-glass-chart"></i> View Global Feature Importance</button>
            </div>
            <div class="chart-wrapper" id="insightsChartWrapper" style="display: none; height: 350px;">
                <canvas id="insightsChart"></canvas>
            </div>
        </div>

        <!-- CSV Upload Card -->
        <div class="glass-card flex-card">
            <div class="card-header">
                    <h2><i class="fa-solid fa-file-csv"></i> Batch Prediction</h2>
                    <p class="subtitle">Upload a CSV file to predict multiple vehicles.</p>
                </div>

                <div class="upload-area" id="uploadArea">
                    <input type="file" id="csvFile" accept=".csv" hidden>
                    <label for="csvFile" class="upload-label">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <span id="fileName">Drop CSV here or click to browse</span>
                    </label>
                </div>

                <div class="input-group" style="margin-bottom:20px;">
                    <label class="dark-mode-label">
                        <input type="checkbox" id="allowMissingCols">
                        <span><i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary)"></i> Auto-fill
                            missing columns</span>
                    </label>
                </div>

                <button onclick="uploadCSV()" class="secondary-btn">
                    <i class="fa-solid fa-gears"></i> Process Batch
                </button>

                <!-- BATCH CHARTS -->
                <div id="csvChartsContainer" class="charts-container" style="display: none; margin-top: 25px;">
                    <div class="chart-wrapper"><canvas id="batchChart1"></canvas></div>
                    <div class="chart-wrapper"><canvas id="batchChart2"></canvas></div>
                    <div class="chart-wrapper"><canvas id="batchChart3"></canvas></div>
                    <div class="chart-wrapper"><canvas id="batchChart4"></canvas></div>
                </div>

                <div id="csvResult" class="csv-result-container"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
